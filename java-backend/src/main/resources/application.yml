server:
  port: 8080

spring:
  application:
    name: product-management-backend
  
  # DevTools 热重载配置
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,public/**
    livereload:
      enabled: true
  
  # 使用H2内存数据库（开发环境）
  datasource:
    url: jdbc:h2:mem:product_management;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
      
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        
  jackson:
    serialization:
      write-dates-as-timestamps: false
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

logging:
  level:
    com.productmanagement: DEBUG
    org.hibernate.SQL: DEBUG

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    liveness:
      enabled: true
    readiness:
      enabled: true
